version: '3.9'

services:
  # ── PostgreSQL + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: freenzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-freenzy}
      POSTGRES_USER: ${DB_USER:-freenzy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-freenzy_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: freenzy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ── FREENZY.IO Backend (Node.js) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freenzy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override host names for Docker network
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-freenzy}:${DB_PASSWORD:-freenzy_secret}@postgres:5432/${DB_NAME:-freenzy}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-freenzy}
      DB_USER: ${DB_USER:-freenzy}
      DB_PASSWORD: ${DB_PASSWORD:-freenzy_secret}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DASHBOARD_ORIGIN: http://localhost:3001
      AVATAR_PYTHON_URL: http://localhost:8000
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - '3010:3000'
    volumes:
      - ./state:/app/state
      - ./roadmap:/app/roadmap
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ── Dashboard (Next.js) ──
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: freenzy-dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Must be accessible from the browser (not Docker-internal hostname)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3010}
    ports:
      - '3001:3000'

volumes:
  postgres_data:
  redis_data:
